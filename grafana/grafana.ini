[server]
# Grafana listens on container port 3000; docker-compose maps host 3001 -> container 3000.
http_port = 3000
domain = itdlhrisdev500.ci.seattle.wa.us # overridden by GF_SERVER_DOMAIN in Docker
root_url = https://itdlhrisdev500.ci.seattle.wa.us/grafana/ # overridden by GF_SERVER_ROOT_URL in Docker
serve_from_sub_path = true # overridden by GF_SERVER_SERVE_FROM_SUB_PATH in Docker

[security]
admin_user = admin
# Prevent version disclosure through update checks and metrics reporting
check_for_updates = false
report_server_metrics = false

[users]
allow_sign_up = false

[auth.anonymous]
enabled = false

[log]
mode = console
level = info

[dashboards]
default_home_dashboard_path = /var/grafana/dashboards/hr-finance/team-overview.json

