  - job_name: auth-gateway
    static_configs:
      - targets: ["fake-exporter:9999"]
    params:
      app: ["auth-gateway"]
    relabel_configs:
      - target_label: app
        replacement: "auth-gateway"
      - target_label: instance
        replacement: "auth-gw-01"
