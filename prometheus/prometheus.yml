global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: demo

scrape_configs:

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: "([^:]+):.*"
        replacement: "${1}"

  - job_name: fake-app
    static_configs:
      - targets: ["fake-exporter:9999"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "app-server-01"
