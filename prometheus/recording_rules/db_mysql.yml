groups:
  - name: db_mysql_normalization
    interval: 15s
    rules:
      # db_type="mysql" is set as a static label on each scrape job served by
      # db-exporter (see ../../db-exporter/README.md), which requires
      # performance_schema enabled for query duration stats.

      # Query duration: exact aggregates from performance_schema.events_statements_summary_by_digest.
      # count/sum are plain sums; max is MySQL's own native per-digest maximum
      # (MAX_TIMER_WAIT), not derived/approximated. No bucket/histogram here --
      # performance_schema exposes no per-call latency distribution via this
      # table, only aggregates, so percentiles would have been guessed;
      # db-exporter/app-analytics.json compute avg from sum/count instead
      # (see grafana/dashboards/app-analytics.json panel id 50).
      - record: db:query_duration_seconds_count
        expr: mysql_perf_schema_events_statements_seconds_count{db_type="mysql"}

      - record: db:query_duration_seconds_sum
        expr: mysql_perf_schema_events_statements_seconds_sum{db_type="mysql"}

      - record: db:query_duration_seconds_max
        expr: mysql_perf_schema_events_statements_seconds_max{db_type="mysql"}

      # Current open connections (global, no per-database breakdown in MySQL).
      # Stored as "database" label with value "mysql" for dashboard consistency.
      - record: db:connections_active
        expr: |
          label_replace(
            mysql_global_status_threads_connected{db_type="mysql"},
            "database", "mysql", "__name__", ".*"
          )

      - record: db:connections_max
        expr: |
          label_replace(
            mysql_global_variables_max_connections{db_type="mysql"},
            "database", "mysql", "__name__", ".*"
          )

      # Replication lag in seconds from replica status.
      # Requires --collect.slave_status flag on mysqld_exporter.
      - record: db:replication_lag_seconds
        expr: mysql_slave_status_seconds_behind_master{db_type="mysql"}

      # Current InnoDB row-level lock waits (gauge).
      - record: db:locks_total
        expr: |
          label_replace(
            mysql_global_status_innodb_current_row_locks{db_type="mysql"},
            "database", "mysql", "__name__", ".*"
          )

      # Cumulative InnoDB deadlock counter.
      - record: db:deadlocks_total
        expr: mysql_global_status_innodb_deadlocks{db_type="mysql"}

      # Per-schema data size in bytes.
      # Requires --collect.info_schema.tables flag on mysqld_exporter.
      # "schema_name" label normalized to "database".
      - record: db:size_bytes
        expr: |
          label_replace(
            mysql_info_schema_table_size_data_length{db_type="mysql"}
            + mysql_info_schema_table_size_index_length{db_type="mysql"},
            "database", "$1", "schema_name", "(.*)"
          )
