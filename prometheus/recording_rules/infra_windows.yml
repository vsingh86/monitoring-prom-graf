groups:
  - name: infra_windows_normalization
    interval: 15s
    rules:
      # host_type="windows" is set as a static label on each windows_exporter scrape job.
      # Assumes prometheus-community/windows_exporter with default collectors enabled:
      #   cpu, cs, logical_disk, memory, net, os
      # label_replace is used to normalize Windows-specific label names to match
      # the Linux schema so the same dashboard panels work for both OS types.

      # Windows uses "core" label; normalize to "cpu" to match Linux node_exporter.
      # Windows idle mode is also "idle" so mode="idle" filter in the dashboard works as-is.
      - record: host:cpu_seconds_total
        expr: |
          label_replace(
            windows_cpu_time_total{host_type="windows"},
            "cpu", "$1", "core", "(.*)"
          )

      # Total physical memory from the ComputerSystem (cs) collector.
      - record: host:memory_total_bytes
        expr: windows_cs_physical_memory_bytes{host_type="windows"}

      - record: host:memory_available_bytes
        expr: windows_memory_available_bytes{host_type="windows"}

      # Page file (virtual memory) used as the Windows equivalent of swap.
      - record: host:memory_swap_total_bytes
        expr: windows_os_paging_limit_bytes{host_type="windows"}

      - record: host:memory_swap_free_bytes
        expr: windows_os_paging_free_bytes{host_type="windows"}

      # Disk I/O: windows_exporter uses "volume" label; normalize to "device".
      - record: host:disk_read_bytes_total
        expr: |
          label_replace(
            windows_logical_disk_read_bytes_total{host_type="windows"},
            "device", "$1", "volume", "(.*)"
          )

      - record: host:disk_written_bytes_total
        expr: |
          label_replace(
            windows_logical_disk_write_bytes_total{host_type="windows"},
            "device", "$1", "volume", "(.*)"
          )

      # Filesystem: rename "volume" (e.g. "C:") to "mountpoint", and inject
      # fstype="ntfs" so the dashboard's fstype!~"tmpfs|overlay" filter passes.
      - record: host:filesystem_avail_bytes
        expr: |
          label_replace(
            label_replace(
              windows_logical_disk_free_bytes{host_type="windows"},
              "mountpoint", "$1", "volume", "(.*)"
            ),
            "fstype", "ntfs", "mountpoint", "(.*)"
          )

      - record: host:filesystem_size_bytes
        expr: |
          label_replace(
            label_replace(
              windows_logical_disk_size_bytes{host_type="windows"},
              "mountpoint", "$1", "volume", "(.*)"
            ),
            "fstype", "ntfs", "mountpoint", "(.*)"
          )

      # Network: windows_exporter uses "nic" label; normalize to "device".
      # The dashboard filters device!~"lo" — Windows has no loopback named "lo"
      # so the filter is harmless.
      - record: host:network_receive_bytes_total
        expr: |
          label_replace(
            windows_net_bytes_received_total{host_type="windows"},
            "device", "$1", "nic", "(.*)"
          )

      - record: host:network_transmit_bytes_total
        expr: |
          label_replace(
            windows_net_bytes_sent_total{host_type="windows"},
            "device", "$1", "nic", "(.*)"
          )
