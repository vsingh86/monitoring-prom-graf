groups:
  - name: java_normalization
    interval: 15s
    rules:
      # app_type="java" is set as a static label on each Java scrape job in prometheus.yml.
      # Assumes Micrometer + Spring Boot Actuator (micrometer-registry-prometheus),
      # which emits http_server_requests_seconds as a Timer (histogram) with labels:
      #   uri, method, status, outcome
      # label_replace maps these to the normalized schema labels: route, status_code.

      - record: app:http_requests_total
        expr: |
          label_replace(
            label_replace(
              http_server_requests_seconds_count{app_type="java"},
              "route", "$1", "uri", "(.*)"
            ),
            "status_code", "$1", "status", "(.*)"
          )

      - record: app:http_request_duration_seconds_bucket
        expr: |
          label_replace(
            label_replace(
              http_server_requests_seconds_bucket{app_type="java"},
              "route", "$1", "uri", "(.*)"
            ),
            "status_code", "$1", "status", "(.*)"
          )

      - record: app:http_request_duration_seconds_count
        expr: |
          label_replace(
            label_replace(
              http_server_requests_seconds_count{app_type="java"},
              "route", "$1", "uri", "(.*)"
            ),
            "status_code", "$1", "status", "(.*)"
          )

      - record: app:http_request_duration_seconds_sum
        expr: |
          label_replace(
            label_replace(
              http_server_requests_seconds_sum{app_type="java"},
              "route", "$1", "uri", "(.*)"
            ),
            "status_code", "$1", "status", "(.*)"
          )

      # Outbound HTTP: Spring Boot / Micrometer emits http_client_requests_seconds
      # with labels uri (used as upstream) and status.
      - record: app:http_client_request_duration_seconds_bucket
        expr: |
          label_replace(
            label_replace(
              http_client_requests_seconds_bucket{app_type="java"},
              "upstream", "$1", "uri", "(.*)"
            ),
            "status_code", "$1", "status", "(.*)"
          )

      - record: app:http_client_request_duration_seconds_count
        expr: |
          label_replace(
            label_replace(
              http_client_requests_seconds_count{app_type="java"},
              "upstream", "$1", "uri", "(.*)"
            ),
            "status_code", "$1", "status", "(.*)"
          )

      - record: app:http_client_request_duration_seconds_sum
        expr: |
          label_replace(
            label_replace(
              http_client_requests_seconds_sum{app_type="java"},
              "upstream", "$1", "uri", "(.*)"
            ),
            "status_code", "$1", "status", "(.*)"
          )
