groups:
  - name: dotnet_framework_normalization
    interval: 15s
    rules:
      # app_type="dotnet-framework" is set as a static label on each .NET Framework
      # scrape job in prometheus.yml. This is DISTINCT from app_type="dotnet"
      # (dotnet.yml), which assumes OpenTelemetry ASP.NET Core auto-instrumentation
      # (http_server_request_duration_seconds, http_route, http_response_status_code).
      # .NET Framework apps (pre-.NET-Core, e.g. .NET Framework 4.8.1) can't use that
      # OTel instrumentation — these rules instead assume manual instrumentation via
      # the `prometheus-net` library, confirmed against real scrape output from the
      # HIMS application in sample-scrape-files/ (dotnet-api-scrape.dat,
      # dotnet-ui-scrape.dat).
      #
      # HIMS ships two components with genuinely different metric shapes, both
      # covered here under the same app_type via `or`:
      #   API/webservice: http_requests_total{method, endpoint, status_code}
      #                    http_request_duration_seconds_{bucket,count,sum}{method, endpoint}
      #   UI:              ui_requests_total (single aggregate counter, NO labels)
      #                    ui_page_load_seconds_{bucket,count,sum}{page}
      #
      # Caveat: ui_requests_total has no status_code/route breakdown at all, so a
      # UI job's traffic only populates aggregate RPS. Panels that filter/group by
      # status_code or route (2xx RPS, Error Count by Status Code, Request Rate by
      # Endpoint) will show "No data" for UI jobs until HIMS's UI instrumentation
      # adds those labels — this is a real gap in the source metrics, not something
      # a recording rule can fabricate.

      - record: app:http_requests_total
        expr: |
          label_replace(
            http_requests_total{app_type="dotnet-framework"},
            "route", "$1", "endpoint", "(.*)"
          )
          or
          ui_requests_total{app_type="dotnet-framework"}

      - record: app:http_request_duration_seconds_bucket
        expr: |
          label_replace(
            http_request_duration_seconds_bucket{app_type="dotnet-framework"},
            "route", "$1", "endpoint", "(.*)"
          )
          or
          label_replace(
            ui_page_load_seconds_bucket{app_type="dotnet-framework"},
            "route", "$1", "page", "(.*)"
          )

      - record: app:http_request_duration_seconds_count
        expr: |
          label_replace(
            http_request_duration_seconds_count{app_type="dotnet-framework"},
            "route", "$1", "endpoint", "(.*)"
          )
          or
          label_replace(
            ui_page_load_seconds_count{app_type="dotnet-framework"},
            "route", "$1", "page", "(.*)"
          )

      - record: app:http_request_duration_seconds_sum
        expr: |
          label_replace(
            http_request_duration_seconds_sum{app_type="dotnet-framework"},
            "route", "$1", "endpoint", "(.*)"
          )
          or
          label_replace(
            ui_page_load_seconds_sum{app_type="dotnet-framework"},
            "route", "$1", "page", "(.*)"
          )

      # No outbound/dependency HTTP instrumentation observed in either sample
      # scrape (no http_client_*-style metric family). app:http_client_request_
      # duration_seconds_* is intentionally not defined here — the "External
      # Dependency Latency p95" panel will show "No data" for this app_type until
      # such instrumentation is added to HIMS.
      #
      # Also observed but not yet normalized (no dashboard panel consumes it today):
      # http_errors_total{method, endpoint, status_code, exception_type} on the API
      # component — richer than app:http_requests_total's status_code alone. Revisit
      # if a future panel wants exception-type breakdowns.
