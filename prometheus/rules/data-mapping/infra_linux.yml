groups:
  - name: infra_linux_normalization
    interval: 15s
    rules:
      # host_type="linux" is set as a static label on each node_exporter scrape job.
      # These rules normalize node_exporter metric names to the shared host:* schema
      # so that app-analytics Layer 2 (Infrastructure) panels work for both Linux
      # and Windows hosts without modification.

      - record: host:cpu_seconds_total
        expr: node_cpu_seconds_total{host_type="linux"}

      - record: host:memory_total_bytes
        expr: node_memory_MemTotal_bytes{host_type="linux"}

      - record: host:memory_available_bytes
        expr: node_memory_MemAvailable_bytes{host_type="linux"}

      - record: host:memory_swap_total_bytes
        expr: node_memory_SwapTotal_bytes{host_type="linux"}

      - record: host:memory_swap_free_bytes
        expr: node_memory_SwapFree_bytes{host_type="linux"}

      - record: host:disk_read_bytes_total
        expr: node_disk_read_bytes_total{host_type="linux"}

      - record: host:disk_written_bytes_total
        expr: node_disk_written_bytes_total{host_type="linux"}

      # node_filesystem exposes mountpoint and fstype labels directly —
      # no remapping needed. The dashboard filters fstype!~"tmpfs|overlay".
      - record: host:filesystem_avail_bytes
        expr: node_filesystem_avail_bytes{host_type="linux"}

      - record: host:filesystem_size_bytes
        expr: node_filesystem_size_bytes{host_type="linux"}

      - record: host:network_receive_bytes_total
        expr: node_network_receive_bytes_total{host_type="linux"}

      - record: host:network_transmit_bytes_total
        expr: node_network_transmit_bytes_total{host_type="linux"}
