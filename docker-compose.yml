# ── DB Exporter (multi-database, blackbox-style) ─────────────────────────────
  # One shared service scrapes Postgres/MySQL/SQL Server/Oracle. Prometheus
  # selects which database via GET /metrics?target=<name>, where <name> must
  # match a "name" entry in db-exporter/config.yaml. See db-exporter/README.md.
  #
  # Passwords come from a repo-root .env file (gitignored, copy from
  # db-exporter/.env.example) via Compose's built-in auto-load -- deliberately
  # NOT an explicit `env_file:` pointing into db-exporter/, because Compose
  # hard-fails validation of the ENTIRE file (blocking prometheus/grafana too)
  # if an explicit env_file path doesn't exist. The root .env is optional by
  # design: if it's missing, these just resolve to empty strings and only
  # db-exporter's own DB connections fail -- prometheus/grafana are unaffected.
  # Adding a new database's password: add the ${VAR} to config.yaml, add the
  # real value to root .env, and add a matching line below.
  db-exporter:
    build:
      context: ./db-exporter
    container_name: db-exporter
    restart: unless-stopped
    environment:
      AUTHAPI_POSTGRES_PASSWORD: ${AUTHAPI_POSTGRES_PASSWORD:-}
      MYAPP_MYSQL_PASSWORD: ${MYAPP_MYSQL_PASSWORD:-}
      MYAPP_SQLSERVER_PASSWORD: ${MYAPP_SQLSERVER_PASSWORD:-}
      MYAPP_ORACLE_PASSWORD: ${ORACLE_PASSWORD:-}
    volumes:
      - ./db-exporter/config.yaml:/app/config.yaml:ro
    ports:
      - "9433:9433"
    networks:
      - monitoring


networks:
  monitoring:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
